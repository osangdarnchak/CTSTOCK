<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CT Stock">
<title>CT Stock</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0f14;
  --card: #1a1a24;
  --card2: #22222e;
  --border: #2e2e3e;
  --accent: #3b82f6;
  --accent2: #6366f1;
  --green: #22c55e;
  --yellow: #f59e0b;
  --red: #ef4444;
  --orange: #f97316;
  --text: #f1f5f9;
  --muted: #64748b;
  --safe: env(safe-area-inset-bottom, 20px);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Sarabun', sans-serif; background: var(--bg); color: var(--text); height: 100dvh; overflow: hidden; }

/* ── LAYOUT ── */
#app { display: flex; flex-direction: column; height: 100dvh; }
#topbar {
  background: var(--card);
  border-bottom: 1px solid var(--border);
  padding: 12px 16px 10px;
  padding-top: calc(env(safe-area-inset-top, 0px) + 12px);
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}
#topbar h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
#topbar h1 span { color: var(--accent); }
#sync-status { font-size: 11px; color: var(--muted); transition: color 0.3s; }
#sync-status.ok { color: var(--green); }
#sync-status.err { color: var(--red); }
#sync-status.loading { color: var(--yellow); }

#pages { flex: 1; overflow: hidden; position: relative; }
.page { position: absolute; inset: 0; overflow-y: auto; padding: 16px; display: none; -webkit-overflow-scrolling: touch; }
.page.active { display: block; }

/* ── BOTTOM NAV ── */
#nav {
  background: var(--card);
  border-top: 1px solid var(--border);
  display: flex;
  padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 4px);
  flex-shrink: 0;
}
.nav-btn {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  padding: 10px 4px 6px; gap: 3px; border: none; background: none;
  color: var(--muted); font-family: 'Sarabun', sans-serif; font-size: 10px;
  cursor: pointer; transition: color 0.2s; position: relative;
}
.nav-btn .icon { font-size: 22px; line-height: 1; }
.nav-btn.active { color: var(--accent); }
.nav-btn .badge {
  position: absolute; top: 6px; right: calc(50% - 18px);
  background: var(--red); color: white; font-size: 9px; font-weight: 700;
  min-width: 16px; height: 16px; border-radius: 8px; display: flex;
  align-items: center; justify-content: center; padding: 0 4px;
}

/* ── CARDS ── */
.kpi-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
.kpi-card {
  background: var(--card); border-radius: 16px; padding: 16px 14px;
  border: 1px solid var(--border);
}
.kpi-card .label { font-size: 11px; color: var(--muted); margin-bottom: 6px; }
.kpi-card .value { font-size: 28px; font-weight: 700; line-height: 1; }
.kpi-card .sub { font-size: 10px; color: var(--muted); margin-top: 4px; }
.kpi-card.blue .value { color: var(--accent); }
.kpi-card.green .value { color: var(--green); }
.kpi-card.yellow .value { color: var(--yellow); }
.kpi-card.red .value { color: var(--red); }

.section-title {
  font-size: 13px; font-weight: 600; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.5px;
  margin-bottom: 10px; margin-top: 4px;
}

/* ── TOOL CARDS ── */
.tool-card {
  background: var(--card); border-radius: 14px; padding: 14px;
  border: 1px solid var(--border); margin-bottom: 10px;
  display: flex; align-items: center; gap: 12px;
  transition: background 0.15s;
  cursor: pointer;
}
.tool-card:active { background: var(--card2); }
.tool-icon {
  width: 44px; height: 44px; border-radius: 12px;
  background: var(--card2); display: flex; align-items: center;
  justify-content: center; font-size: 20px; flex-shrink: 0;
}
.tool-info { flex: 1; min-width: 0; }
.tool-name { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tool-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
.tool-serial { font-size: 11px; color: var(--accent); margin-top: 3px; font-family: monospace; }
.status-pill {
  padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 600;
  flex-shrink: 0;
}
.status-stock { background: rgba(34,197,94,0.15); color: var(--green); }
.status-inuse { background: rgba(245,158,11,0.15); color: var(--yellow); }
.status-used_ok { background: rgba(99,102,241,0.15); color: var(--accent2); }
.status-scrapped { background: rgba(239,68,68,0.15); color: var(--red); }
.status-used_inspect { background: rgba(249,115,22,0.15); color: var(--orange); }

/* ── SEARCH ── */
.search-wrap { position: relative; margin-bottom: 14px; }
.search-wrap input {
  width: 100%; background: var(--card); border: 1px solid var(--border);
  border-radius: 12px; padding: 11px 16px 11px 40px;
  color: var(--text); font-family: 'Sarabun', sans-serif; font-size: 15px;
  outline: none;
}
.search-wrap input::placeholder { color: var(--muted); }
.search-wrap .search-icon {
  position: absolute; left: 13px; top: 50%; transform: translateY(-50%);
  font-size: 16px; color: var(--muted);
}

/* ── FILTER CHIPS ── */
.chips { display: flex; gap: 8px; overflow-x: auto; margin-bottom: 14px; padding-bottom: 2px; scrollbar-width: none; }
.chips::-webkit-scrollbar { display: none; }
.chip {
  padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 600;
  white-space: nowrap; border: 1px solid var(--border); background: var(--card);
  color: var(--muted); cursor: pointer; transition: all 0.2s; flex-shrink: 0;
}
.chip.active { background: var(--accent); color: white; border-color: var(--accent); }

/* ── BUTTONS ── */
.btn {
  width: 100%; padding: 15px; border-radius: 14px; border: none;
  font-family: 'Sarabun', sans-serif; font-size: 16px; font-weight: 600;
  cursor: pointer; transition: opacity 0.2s; display: flex; align-items: center;
  justify-content: center; gap: 8px;
}
.btn:active { opacity: 0.8; }
.btn-primary { background: var(--accent); color: white; }
.btn-success { background: var(--green); color: white; }
.btn-warning { background: var(--yellow); color: #000; }
.btn-danger { background: var(--red); color: white; }
.btn-ghost { background: var(--card); color: var(--text); border: 1px solid var(--border); }

/* ── FAB ── */
#fab {
  position: fixed; bottom: calc(env(safe-area-inset-bottom, 0px) + 70px); right: 20px;
  width: 56px; height: 56px; border-radius: 28px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border: none; font-size: 24px; color: white; cursor: pointer;
  box-shadow: 0 4px 20px rgba(59,130,246,0.4);
  display: flex; align-items: center; justify-content: center;
  transition: transform 0.2s, box-shadow 0.2s;
  z-index: 100;
}
#fab:active { transform: scale(0.92); }

/* ── MODAL ── */
.modal-backdrop {
  position: fixed; inset: 0; background: rgba(0,0,0,0.7);
  backdrop-filter: blur(4px); z-index: 200; display: none;
  align-items: flex-end; justify-content: center;
}
.modal-backdrop.open { display: flex; }
.modal-sheet {
  background: var(--card); border-radius: 24px 24px 0 0;
  width: 100%; max-width: 600px;
  padding: 0 20px calc(env(safe-area-inset-bottom, 0px) + 24px);
  max-height: 85dvh; overflow-y: auto;
  animation: slideUp 0.3s cubic-bezier(0.32,0.72,0,1);
}
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 12px auto 20px; }
.modal-title { font-size: 18px; font-weight: 700; margin-bottom: 20px; }

/* ── FORM ── */
.form-group { margin-bottom: 14px; }
.form-label { font-size: 12px; color: var(--muted); font-weight: 600; margin-bottom: 6px; display: block; text-transform: uppercase; letter-spacing: 0.3px; }
.form-input {
  width: 100%; background: var(--card2); border: 1px solid var(--border);
  border-radius: 12px; padding: 13px 14px; color: var(--text);
  font-family: 'Sarabun', sans-serif; font-size: 15px; outline: none;
}
.form-input:focus { border-color: var(--accent); }
select.form-input { appearance: none; }

/* ── TXNS LIST ── */
.txn-item {
  display: flex; gap: 12px; padding: 12px 0;
  border-bottom: 1px solid var(--border);
}
.txn-item:last-child { border-bottom: none; }
.txn-dot {
  width: 36px; height: 36px; border-radius: 10px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center; font-size: 16px;
}
.txn-buy { background: rgba(34,197,94,0.15); }
.txn-issue { background: rgba(245,158,11,0.15); }
.txn-return { background: rgba(99,102,241,0.15); }
.txn-info { flex: 1; min-width: 0; }
.txn-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.txn-detail { font-size: 11px; color: var(--muted); margin-top: 2px; }

/* ── LOADING ── */
.spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
.empty-state .emoji { font-size: 48px; margin-bottom: 12px; }

/* ── DETAIL MODAL ── */
.detail-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border); }
.detail-row:last-child { border-bottom: none; }
.detail-key { font-size: 13px; color: var(--muted); }
.detail-val { font-size: 13px; font-weight: 600; text-align: right; }

.history-item { padding: 10px 0; border-bottom: 1px solid var(--border); }
.history-item:last-child { border-bottom: none; }
.history-event { font-size: 12px; font-weight: 600; color: var(--accent); }
.history-detail { font-size: 12px; color: var(--muted); margin-top: 2px; }
</style>
</head>
<body>
<div id="app">

  <!-- TOP BAR -->
  <div id="topbar">
    <h1>CUT<span>TOOL</span> MS</h1>
    <span id="sync-status">⏳ กำลังโหลด...</span>
  </div>

  <!-- PAGES -->
  <div id="pages">

    <!-- DASHBOARD -->
    <div class="page active" id="page-dashboard">
      <div class="kpi-grid">
        <div class="kpi-card blue">
          <div class="label">Tool ทั้งหมด</div>
          <div class="value" id="kpi-total">—</div>
          <div class="sub" id="kpi-serial-sub">—</div>
        </div>
        <div class="kpi-card green">
          <div class="label">In Stock</div>
          <div class="value" id="kpi-stock">—</div>
          <div class="sub">พร้อมใช้งาน</div>
        </div>
        <div class="kpi-card yellow">
          <div class="label">In Use</div>
          <div class="value" id="kpi-inuse">—</div>
          <div class="sub">กำลังใช้งาน</div>
        </div>
        <div class="kpi-card red">
          <div class="label">Scrapped</div>
          <div class="value" id="kpi-scrap">—</div>
          <div class="sub">ทิ้งแล้ว</div>
        </div>
      </div>

      <div class="section-title">Transaction ล่าสุด</div>
      <div id="recent-txns"></div>
    </div>

    <!-- STOCK -->
    <div class="page" id="page-stock">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="search-stock" placeholder="ค้นหา Tool, Serial..." oninput="renderStock()">
      </div>
      <div class="chips" id="status-chips">
        <div class="chip active" data-status="" onclick="setStatusFilter('')">ทั้งหมด</div>
        <div class="chip" data-status="stock" onclick="setStatusFilter('stock')">Stock</div>
        <div class="chip" data-status="inuse" onclick="setStatusFilter('inuse')">In Use</div>
        <div class="chip" data-status="used_ok" onclick="setStatusFilter('used_ok')">Used OK</div>
        <div class="chip" data-status="scrapped" onclick="setStatusFilter('scrapped')">Scrapped</div>
      </div>
      <div id="stock-list"></div>
    </div>

    <!-- เบิก -->
    <div class="page" id="page-issue">
      <div class="section-title">เบิก Tool จาก Stock</div>
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="search-issue" placeholder="ค้นหา Tool ที่ต้องการเบิก..." oninput="renderIssueList()">
      </div>
      <div id="issue-list"></div>
    </div>

    <!-- คืน -->
    <div class="page" id="page-return">
      <div class="section-title">คืน Tool</div>
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="search-return" placeholder="ค้นหา Tool ที่กำลังใช้งาน..." oninput="renderReturnList()">
      </div>
      <div id="return-list"></div>
    </div>

  </div>

  <!-- BOTTOM NAV -->
  <nav id="nav">
    <button class="nav-btn active" onclick="goPage('dashboard')" id="nav-dashboard">
      <span class="icon">📊</span>Dashboard
    </button>
    <button class="nav-btn" onclick="goPage('stock')" id="nav-stock">
      <span class="icon">🗂</span>Stock
      <span class="badge" id="badge-stock" style="display:none"></span>
    </button>
    <button class="nav-btn" onclick="goPage('issue')" id="nav-issue">
      <span class="icon">📤</span>เบิก
    </button>
    <button class="nav-btn" onclick="goPage('return')" id="nav-return">
      <span class="icon">↩️</span>คืน
      <span class="badge" id="badge-return" style="display:none"></span>
    </button>
  </nav>

</div>

<!-- TOOL DETAIL MODAL -->
<div class="modal-backdrop" id="modal-detail" onclick="closeDetailIfBackdrop(event)">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title" id="detail-title">—</div>
    <div id="detail-content"></div>
  </div>
</div>

<!-- ISSUE CONFIRM MODAL -->
<div class="modal-backdrop" id="modal-issue" onclick="closeIssueIfBackdrop(event)">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">📤 เบิก Tool</div>
    <div id="issue-tool-info" style="background:var(--card2);border-radius:12px;padding:12px;margin-bottom:16px;"></div>
    <div class="form-group">
      <label class="form-label">แผนก</label>
      <input type="text" class="form-input" id="issue-dept" placeholder="ชื่อแผนก เช่น CNC-1">
    </div>
    <div class="form-group">
      <label class="form-label">ผู้เบิก</label>
      <input type="text" class="form-input" id="issue-person" placeholder="ชื่อผู้เบิก">
    </div>
    <div class="form-group">
      <label class="form-label">หมายเหตุ</label>
      <input type="text" class="form-input" id="issue-note" placeholder="(ถ้ามี)">
    </div>
    <button class="btn btn-warning" style="margin-top:8px;" onclick="confirmIssue()">✅ ยืนยันเบิก</button>
    <button class="btn btn-ghost" style="margin-top:10px;" onclick="closeModal('modal-issue')">ยกเลิก</button>
  </div>
</div>

<!-- RETURN CONFIRM MODAL -->
<div class="modal-backdrop" id="modal-return" onclick="closeReturnIfBackdrop(event)">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">↩️ คืน Tool</div>
    <div id="return-tool-info" style="background:var(--card2);border-radius:12px;padding:12px;margin-bottom:16px;"></div>
    <div class="form-group">
      <label class="form-label">สภาพ Tool</label>
      <select class="form-input" id="return-condition">
        <option value="used_ok">✅ ใช้ได้ (Used OK)</option>
        <option value="used_inspect">🔍 ต้องตรวจสอบ</option>
        <option value="scrapped">❌ เสียแล้ว (Scrap)</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">หมายเหตุ</label>
      <input type="text" class="form-input" id="return-note" placeholder="(ถ้ามี)">
    </div>
    <button class="btn btn-success" style="margin-top:8px;" onclick="confirmReturn()">✅ ยืนยันคืน</button>
    <button class="btn btn-ghost" style="margin-top:10px;" onclick="closeModal('modal-return')">ยกเลิก</button>
  </div>
</div>

<script>
// ── CONFIG ──
const GAS_URL = 'https://script.google.com/macros/s/4iZ82y630n0JJCpjMaQmjisOXSJMqpJMcPlXu6Qma7TpxzYxCRAITftXK4SS/exec';
const CACHE_KEY = 'ctstock_mobile_v1';

// ── DATA ──
let REGISTRY = [];
let TXNS = [];
let currentPage = 'dashboard';
let statusFilter = '';
let selectedTool = null;
let saveTimer = null;

// ── TYPE ICONS ──
const TYPE_ICON = {
  'Endmill':'🔵','Insert':'🔶','Drill':'🔩','Tap':'🔧','Reamer':'⚙️',
  'Ball':'🟣','Chamfer':'◇','Spot Drill':'🎯','screw':'🔩',
  'U-DRILL':'🔩','THREAD MILL':'🔧','ลวด wire cut':'〰️',
  'Back Chamfer':'◆','Hand Reamer':'⚙️','REAMER CARBIDE':'⚙️',
};
function typeIcon(t) { return TYPE_ICON[t] || '🔧'; }

// ── STATUS LABEL ──
function statusLabel(s) {
  return {stock:'Stock',inuse:'In Use',used_ok:'Used OK',scrapped:'Scrapped',used_inspect:'Inspect'}[s] || s;
}

// ── STORAGE ──
function saveLocal() {
  try { localStorage.setItem(CACHE_KEY, JSON.stringify({REGISTRY, TXNS})); } catch(e) {}
}
function loadLocal() {
  try {
    const r = localStorage.getItem(CACHE_KEY);
    if (!r) return false;
    const d = JSON.parse(r);
    if (d.REGISTRY && d.TXNS) {
      REGISTRY = d.REGISTRY; TXNS = d.TXNS; return true;
    }
  } catch(e) {}
  return false;
}

function setSyncStatus(msg, cls) {
  const el = document.getElementById('sync-status');
  el.textContent = msg; el.className = cls || '';
}

// ── JSONP LOAD ──
function jsonpCall(url) {
  return new Promise((resolve, reject) => {
    const cb = '_cb' + Date.now();
    const script = document.createElement('script');
    const timer = setTimeout(() => { cleanup(); reject(new Error('timeout')); }, 15000);
    function cleanup() { delete window[cb]; if (script.parentNode) script.parentNode.removeChild(script); clearTimeout(timer); }
    window[cb] = data => { cleanup(); resolve(data); };
    script.src = url + (url.includes('?') ? '&' : '?') + 'callback=' + cb;
    script.onerror = () => { cleanup(); reject(new Error('network error')); };
    document.head.appendChild(script);
  });
}

async function loadFromSheets() {
  setSyncStatus('⏳ โหลดข้อมูล...', 'loading');
  try {
    const d = await jsonpCall(GAS_URL + '?action=load');
    if (d.error) throw new Error(d.error);
    if (!d.REGISTRY || d.REGISTRY.length === 0) {
      setSyncStatus('⚠ Sheets ว่าง', 'err'); return false;
    }
    REGISTRY = d.REGISTRY.map(r => ({...r, hasSerial: r.hasSerial === true || r.hasSerial === 'true', history: Array.isArray(r.history) ? r.history : []}));
    TXNS = d.TXNS.map(t => ({...t, hasSerial: t.hasSerial === true || t.hasSerial === 'true'}));
    saveLocal();
    setSyncStatus('☁️ Synced', 'ok');
    return true;
  } catch(e) {
    setSyncStatus('⚠ ' + e.message, 'err'); return false;
  }
}

async function saveToSheets() {
  try {
    await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({REGISTRY, TXNS, META: {}}) });
    setSyncStatus('☁️ Saved', 'ok');
  } catch(e) {
    setSyncStatus('⚠ Save failed', 'err');
  }
}

function scheduleSave() {
  saveLocal();
  clearTimeout(saveTimer);
  setSyncStatus('✏ บันทึก...', 'loading');
  saveTimer = setTimeout(saveToSheets, 1500);
}

// ── NAV ──
function goPage(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  document.getElementById('nav-' + page).classList.add('active');
  currentPage = page;
  if (page === 'dashboard') renderDashboard();
  if (page === 'stock') renderStock();
  if (page === 'issue') renderIssueList();
  if (page === 'return') renderReturnList();
}

// ── DASHBOARD ──
function renderDashboard() {
  const total = REGISTRY.length;
  const stock = REGISTRY.filter(r => r.status === 'stock').length;
  const inuse = REGISTRY.filter(r => r.status === 'inuse').length;
  const scrap = REGISTRY.filter(r => r.status === 'scrapped').length;
  const serialCount = REGISTRY.filter(r => r.hasSerial).length;
  document.getElementById('kpi-total').textContent = total;
  document.getElementById('kpi-serial-sub').textContent = `Serial ${serialCount} รายการ`;
  document.getElementById('kpi-stock').textContent = stock;
  document.getElementById('kpi-inuse').textContent = inuse;
  document.getElementById('kpi-scrap').textContent = scrap;

  // Badge
  const badgeStock = document.getElementById('badge-stock');
  if (stock > 0) { badgeStock.textContent = stock; badgeStock.style.display = 'flex'; }
  const badgeReturn = document.getElementById('badge-return');
  if (inuse > 0) { badgeReturn.textContent = inuse; badgeReturn.style.display = 'flex'; }

  // Recent txns
  const recent = [...TXNS].sort((a,b) => (b.date||'').localeCompare(a.date||'')).slice(0, 10);
  const container = document.getElementById('recent-txns');
  if (recent.length === 0) {
    container.innerHTML = '<div class="empty-state"><div class="emoji">📭</div><div>ยังไม่มี Transaction</div></div>';
    return;
  }
  container.innerHTML = recent.map(t => {
    const icon = t.event === 'buy' ? '🛒' : t.event === 'issue' ? '📤' : '↩️';
    const cls = t.event === 'buy' ? 'txn-buy' : t.event === 'issue' ? 'txn-issue' : 'txn-return';
    const evLabel = t.event === 'buy' ? 'ซื้อ/นำเข้า' : t.event === 'issue' ? 'เบิก' : 'คืน';
    return `<div class="txn-item">
      <div class="txn-dot ${cls}">${icon}</div>
      <div class="txn-info">
        <div class="txn-name">${t.name||'—'}</div>
        <div class="txn-detail">${evLabel} · ${t.date||'—'} · ${t.person||t.supplier||'—'}</div>
      </div>
    </div>`;
  }).join('');
}

// ── STOCK ──
function setStatusFilter(s) {
  statusFilter = s;
  document.querySelectorAll('.chip').forEach(c => {
    c.classList.toggle('active', c.dataset.status === s);
  });
  renderStock();
}

function renderStock() {
  const q = (document.getElementById('search-stock')?.value || '').toLowerCase();
  let list = REGISTRY;
  if (statusFilter) list = list.filter(r => r.status === statusFilter);
  if (q) list = list.filter(r =>
    (r.name||'').toLowerCase().includes(q) ||
    (r.serial||'').toLowerCase().includes(q) ||
    (r.type||'').toLowerCase().includes(q) ||
    (r.brand||'').toLowerCase().includes(q)
  );
  const container = document.getElementById('stock-list');
  if (list.length === 0) {
    container.innerHTML = '<div class="empty-state"><div class="emoji">🔍</div><div>ไม่พบ Tool</div></div>';
    return;
  }
  container.innerHTML = list.slice(0, 50).map(r => `
    <div class="tool-card" onclick="openDetail('${r.id}')">
      <div class="tool-icon">${typeIcon(r.type)}</div>
      <div class="tool-info">
        <div class="tool-name">${r.name||'—'}</div>
        <div class="tool-sub">${r.brand||'—'} · ${r.type||'—'}</div>
        ${r.hasSerial && r.serial ? `<div class="tool-serial">${r.serial}</div>` : `<div class="tool-sub">Qty: ${r.qty||1}</div>`}
      </div>
      <span class="status-pill status-${r.status}">${statusLabel(r.status)}</span>
    </div>
  `).join('') + (list.length > 50 ? `<div style="text-align:center;color:var(--muted);padding:12px;font-size:13px;">แสดง 50 จาก ${list.length} รายการ — ค้นหาเพื่อกรองเพิ่ม</div>` : '');
}

// ── ISSUE ──
function renderIssueList() {
  const q = (document.getElementById('search-issue')?.value || '').toLowerCase();
  let list = REGISTRY.filter(r => r.status === 'stock');
  if (q) list = list.filter(r =>
    (r.name||'').toLowerCase().includes(q) ||
    (r.serial||'').toLowerCase().includes(q) ||
    (r.type||'').toLowerCase().includes(q) ||
    (r.brand||'').toLowerCase().includes(q)
  );
  const container = document.getElementById('issue-list');
  if (list.length === 0) {
    container.innerHTML = '<div class="empty-state"><div class="emoji">📦</div><div>ไม่มี Tool ใน Stock</div></div>';
    return;
  }
  container.innerHTML = list.slice(0, 50).map(r => `
    <div class="tool-card" onclick="openIssueModal('${r.id}')">
      <div class="tool-icon">${typeIcon(r.type)}</div>
      <div class="tool-info">
        <div class="tool-name">${r.name||'—'}</div>
        <div class="tool-sub">${r.brand||'—'} · ${r.type||'—'}</div>
        ${r.hasSerial && r.serial ? `<div class="tool-serial">${r.serial}</div>` : `<div class="tool-sub">Qty: ${r.qty||1}</div>`}
      </div>
      <span style="font-size:22px;color:var(--accent);">›</span>
    </div>
  `).join('');
}

function openIssueModal(id) {
  selectedTool = REGISTRY.find(r => r.id === id);
  if (!selectedTool) return;
  document.getElementById('issue-tool-info').innerHTML = `
    <div style="font-size:15px;font-weight:600;">${selectedTool.name}</div>
    <div style="font-size:12px;color:var(--muted);margin-top:4px;">${selectedTool.brand||'—'} · ${selectedTool.type||'—'}</div>
    ${selectedTool.serial ? `<div style="font-size:12px;color:var(--accent);margin-top:4px;font-family:monospace;">${selectedTool.serial}</div>` : ''}
  `;
  document.getElementById('issue-dept').value = '';
  document.getElementById('issue-person').value = '';
  document.getElementById('issue-note').value = '';
  document.getElementById('modal-issue').classList.add('open');
}

function confirmIssue() {
  if (!selectedTool) return;
  const dept = document.getElementById('issue-dept').value.trim();
  const person = document.getElementById('issue-person').value.trim();
  const note = document.getElementById('issue-note').value.trim();
  if (!person) { alert('กรุณาใส่ชื่อผู้เบิก'); return; }
  const date = new Date().toISOString().slice(0,10);
  const txnId = 'ISS-' + Date.now();
  selectedTool.status = 'inuse';
  selectedTool.holder = person;
  selectedTool.dept = dept;
  selectedTool.history = selectedTool.history || [];
  selectedTool.history.push({event:'issue', date, person, note, txnId});
  TXNS.push({id:txnId, event:'issue', date, toolId:selectedTool.id, serial:selectedTool.serial||null, hasSerial:selectedTool.hasSerial, type:selectedTool.type, name:selectedTool.name, brand:selectedTool.brand, qty:1, dept, person, note});
  closeModal('modal-issue');
  scheduleSave();
  renderIssueList();
  const badgeReturn = document.getElementById('badge-return');
  const inuse = REGISTRY.filter(r => r.status === 'inuse').length;
  badgeReturn.textContent = inuse; badgeReturn.style.display = 'flex';
}

// ── RETURN ──
function renderReturnList() {
  const q = (document.getElementById('search-return')?.value || '').toLowerCase();
  let list = REGISTRY.filter(r => r.status === 'inuse');
  if (q) list = list.filter(r =>
    (r.name||'').toLowerCase().includes(q) ||
    (r.serial||'').toLowerCase().includes(q) ||
    (r.holder||'').toLowerCase().includes(q)
  );
  const container = document.getElementById('return-list');
  if (list.length === 0) {
    container.innerHTML = '<div class="empty-state"><div class="emoji">✅</div><div>ไม่มี Tool ที่ถูกเบิกอยู่</div></div>';
    return;
  }
  container.innerHTML = list.slice(0, 50).map(r => `
    <div class="tool-card" onclick="openReturnModal('${r.id}')">
      <div class="tool-icon">${typeIcon(r.type)}</div>
      <div class="tool-info">
        <div class="tool-name">${r.name||'—'}</div>
        <div class="tool-sub">${r.holder||'—'} · ${r.dept||'—'}</div>
        ${r.hasSerial && r.serial ? `<div class="tool-serial">${r.serial}</div>` : ''}
      </div>
      <span style="font-size:22px;color:var(--green);">›</span>
    </div>
  `).join('');
}

function openReturnModal(id) {
  selectedTool = REGISTRY.find(r => r.id === id);
  if (!selectedTool) return;
  document.getElementById('return-tool-info').innerHTML = `
    <div style="font-size:15px;font-weight:600;">${selectedTool.name}</div>
    <div style="font-size:12px;color:var(--muted);margin-top:4px;">ผู้เบิก: ${selectedTool.holder||'—'} · ${selectedTool.dept||'—'}</div>
    ${selectedTool.serial ? `<div style="font-size:12px;color:var(--accent);margin-top:4px;font-family:monospace;">${selectedTool.serial}</div>` : ''}
  `;
  document.getElementById('return-note').value = '';
  document.getElementById('return-condition').value = 'used_ok';
  document.getElementById('modal-return').classList.add('open');
}

function confirmReturn() {
  if (!selectedTool) return;
  const condition = document.getElementById('return-condition').value;
  const note = document.getElementById('return-note').value.trim();
  const date = new Date().toISOString().slice(0,10);
  const txnId = 'RET-' + Date.now();
  const prevHolder = selectedTool.holder;
  selectedTool.status = condition;
  selectedTool.holder = '';
  selectedTool.dept = '';
  selectedTool.history = selectedTool.history || [];
  selectedTool.history.push({event:'return', date, person:prevHolder, note, txnId, condition});
  TXNS.push({id:txnId, event:'return', date, toolId:selectedTool.id, serial:selectedTool.serial||null, hasSerial:selectedTool.hasSerial, type:selectedTool.type, name:selectedTool.name, brand:selectedTool.brand, qty:1, condition, person:prevHolder, note});
  closeModal('modal-return');
  scheduleSave();
  renderReturnList();
  const inuse = REGISTRY.filter(r => r.status === 'inuse').length;
  const badgeReturn = document.getElementById('badge-return');
  if (inuse > 0) { badgeReturn.textContent = inuse; badgeReturn.style.display = 'flex'; }
  else { badgeReturn.style.display = 'none'; }
}

// ── DETAIL MODAL ──
function openDetail(id) {
  const r = REGISTRY.find(x => x.id === id);
  if (!r) return;
  document.getElementById('detail-title').textContent = r.name || '—';
  const history = (r.history || []).slice().reverse().slice(0, 5);
  document.getElementById('detail-content').innerHTML = `
    <div class="detail-row"><span class="detail-key">ประเภท</span><span class="detail-val">${r.type||'—'}</span></div>
    <div class="detail-row"><span class="detail-key">แบรนด์</span><span class="detail-val">${r.brand||'—'}</span></div>
    <div class="detail-row"><span class="detail-key">Serial</span><span class="detail-val" style="font-family:monospace;color:var(--accent)">${r.serial||'ไม่มี'}</span></div>
    <div class="detail-row"><span class="detail-key">สถานะ</span><span class="detail-val"><span class="status-pill status-${r.status}">${statusLabel(r.status)}</span></span></div>
    <div class="detail-row"><span class="detail-key">ผู้ถือ</span><span class="detail-val">${r.holder||'—'}</span></div>
    <div class="detail-row"><span class="detail-key">แผนก</span><span class="detail-val">${r.dept||'—'}</span></div>
    <div class="detail-row"><span class="detail-key">ราคา</span><span class="detail-val">${r.price ? r.price.toLocaleString() + ' ฿' : '—'}</span></div>
    <div class="detail-row"><span class="detail-key">วันที่ซื้อ</span><span class="detail-val">${r.buyDate||'—'}</span></div>
    ${history.length ? `
      <div class="section-title" style="margin-top:16px;">ประวัติล่าสุด</div>
      ${history.map(h => `
        <div class="history-item">
          <div class="history-event">${h.event === 'buy' ? '🛒 ซื้อ' : h.event === 'issue' ? '📤 เบิก' : '↩️ คืน'} · ${h.date||''}</div>
          <div class="history-detail">${h.person||''} ${h.note ? '· '+h.note : ''}</div>
        </div>
      `).join('')}
    ` : ''}
    ${r.status === 'stock' ? `<button class="btn btn-warning" style="margin-top:20px;" onclick="closeModal('modal-detail');setTimeout(()=>openIssueModal('${r.id}'),200)">📤 เบิก Tool นี้</button>` : ''}
    ${r.status === 'inuse' ? `<button class="btn btn-success" style="margin-top:20px;" onclick="closeModal('modal-detail');setTimeout(()=>openReturnModal('${r.id}'),200)">↩️ คืน Tool นี้</button>` : ''}
  `;
  document.getElementById('modal-detail').classList.add('open');
}

// ── MODALS ──
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function closeDetailIfBackdrop(e) { if (e.target.id === 'modal-detail') closeModal('modal-detail'); }
function closeIssueIfBackdrop(e) { if (e.target.id === 'modal-issue') closeModal('modal-issue'); }
function closeReturnIfBackdrop(e) { if (e.target.id === 'modal-return') closeModal('modal-return'); }

// ── INIT ──
(async () => {
  const cached = loadLocal();
  if (cached) { renderDashboard(); }
  const ok = await loadFromSheets();
  if (ok) { renderDashboard(); }
  else if (!cached) {
    setSyncStatus('⚠ ไม่มีข้อมูล', 'err');
  }
})();
</script>
</body>
</html>
